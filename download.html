<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATS Resume Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:'Poppins';background:#0a0a0a;color:white;text-align:center;}
.wrapper {max-width:1000px;margin:auto;padding:20px;}
input,textarea {width:90%;padding:10px;margin:8px;}
button {padding:12px;background:#00ffcc;border:none;border-radius:8px;cursor:pointer;}
#formSection{display:none;}
.resume{display:flex;background:white;color:black;margin-top:20px;}
.sidebar{width:35%;background:#e6e6e6;padding:20px;}
.main{width:65%;padding:20px;}
.profile-img{width:120px;height:120px;border-radius:50%;overflow:hidden;margin:auto;background:#ccc;}
.profile-img img{width:100%;height:100%;object-fit:cover;}
.bar{height:6px;background:#ccc;}
.fill{height:6px;background:black;}
.timeline{position:relative;margin-left:20px;}
.timeline::before{content:'';position:absolute;left:-10px;width:2px;height:100%;background:black;}
.dot{width:10px;height:10px;background:black;border-radius:50%;position:absolute;left:-15px;top:5px;}
</style>
</head>

<body>

<div class="wrapper">

<h1>🚀 Build Resume</h1>
<button onclick="start()">Start</button>

<div id="formSection">

<input id="name" placeholder="Full Name">
<input id="title" placeholder="Job Title">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">

<input type="file" id="imageUpload">

<textarea id="profile" placeholder="Profile"></textarea>
<button onclick="aiImprove('profile')">✨ Improve with AI</button>

<textarea id="skills" placeholder="Skills (comma separated)"></textarea>

<h3>Experience</h3>
<div id="experienceContainer"></div>
<button onclick="addExperience()">+ Add</button>

<h3>Education</h3>
<div id="educationContainer"></div>
<button onclick="addEducation()">+ Add</button>

<button onclick="saveData()">💾 Save</button>
<button onclick="generateResume()">Generate</button>

</div>

<h2 id="atsScore"></h2>
<div id="resume"></div>

<button onclick="downloadPDF()">Download PDF</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

/* START */
function start(){
 document.getElementById("formSection").style.display="block";
 loadData();
}

/* SAVE */
function saveData(){
 const data={
  name:name.value,title:title.value,phone:phone.value,email:email.value,
  profile:profile.value,skills:skills.value
 };
 localStorage.setItem("resumeData",JSON.stringify(data));
 alert("Saved!");
}

/* LOAD */
function loadData(){
 let d=JSON.parse(localStorage.getItem("resumeData"));
 if(!d) return;
 name.value=d.name||"";
 title.value=d.title||"";
 phone.value=d.phone||"";
 email.value=d.email||"";
 profile.value=d.profile||"";
 skills.value=d.skills||"";
}

/* ADD EXPERIENCE */
function addExperience(){
 let div=document.createElement("div");
 div.innerHTML=`<input placeholder="Role"><input placeholder="Company"><textarea placeholder="Description"></textarea>`;
 experienceContainer.appendChild(div);
}

/* ADD EDUCATION */
function addEducation(){
 let div=document.createElement("div");
 div.innerHTML=`<input placeholder="Degree"><input placeholder="University">`;
 educationContainer.appendChild(div);
}

/* AI */
async function aiImprove(id){
 let text=document.getElementById(id).value;

 try{
 let res=await fetch("https://your-render-url.onrender.com/ai",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({text})
 });

 let data=await res.json();
 document.getElementById(id).value=data.result;
 }catch{
  alert("AI not connected yet");
 }
}

/* ATS */
function calculateATS(profile,skillsCount,expCount){
 let s=40;
 if(profile.length>80) s+=20;
 if(skillsCount>=5) s+=20;
 if(expCount>=2) s+=15;
 return Math.min(s,98);
}

/* GENERATE */
function generateResume(){

let img="";
if(imageUpload.files[0]){
 img=`<img src="${URL.createObjectURL(imageUpload.files[0])}">`;
}

let expHTML="";
let expBlocks=document.querySelectorAll("#experienceContainer div");

expBlocks.forEach(e=>{
 let i=e.querySelectorAll("input,textarea");
 expHTML+=`<div class="timeline-item"><div class="dot"></div><div><b>${i[0].value}</b><br>${i[1].value}<br>${i[2].value}</div></div>`;
});

let eduHTML="";
document.querySelectorAll("#educationContainer div").forEach(e=>{
 let i=e.querySelectorAll("input");
 eduHTML+=`<p><b>${i[0].value}</b><br>${i[1].value}</p>`;
});

let skillsArr=skills.value.split(",");
let skillHTML="";
skillsArr.forEach(s=>{
 skillHTML+=`<div>${s}<div class="bar"><div class="fill" style="width:80%"></div></div></div>`;
});

let score=calculateATS(profile.value,skillsArr.length,expBlocks.length);
atsScore.innerHTML="ATS Score: "+score+"%";

resume.innerHTML=`
<div class="resume">
<div class="sidebar">
<div class="profile-img">${img}</div>
<h2>${name.value}</h2>
<p>${title.value}</p>

<h3>Profile</h3><p>${profile.value}</p>

<h3>Contact</h3><p>${phone.value}</p><p>${email.value}</p>

<h3>Skills</h3>${skillHTML}
</div>

<div class="main">
<h2>Experience</h2><div class="timeline">${expHTML}</div>
<h2>Education</h2>${eduHTML}
</div>
</div>`;

resume.style.display="block";
}

/* PDF */
function downloadPDF(){
 html2pdf().from(resume).save("resume.pdf");
}

</script>

</body>
</html>
